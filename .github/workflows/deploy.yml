name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 💡 失敗したときにボタン一つで手動再実行できるようにするスイッチ

# ⚠️ 2026年の仕様：GitHub ActionsにPagesへの書き込み権限を「明示的」に与えます
permissions:
  contents: read
  pages: write
  id-token: write

# 1つのデプロイが走っている時は、古いデプロイを自動でキャンセルして衝突を防ぐ
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 💡 2026年最新：Java環境のセットアップ（Flutterの内部エラーを防ぐため必須化）
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      # Flutterの導入（最新のv2仕様）
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # ビルドを高速化
          
      - name: Build Web
        run: flutter build web --release --base-href "/pwa-test/" --dart-define=FLUTTER_WEB_RENDERER=html
        
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 👈 2026年最新のv4にアップデート
